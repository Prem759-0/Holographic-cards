<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HOLO — Card Gallery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08080f;--bg2:#0d0d1a;
  --text:#f0f0ff;--text2:rgba(240,240,255,0.5);--text3:rgba(240,240,255,0.2);
  --border:rgba(255,255,255,0.08);
  --font:'Space Grotesk',sans-serif;
  --display:'Bebas Neue',cursive;
  --mono:'Space Mono',monospace;
}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;}
body{cursor:none;}

/* CURSOR */
#cur,#cur2{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transition:transform 0.1s;}
#cur{width:8px;height:8px;background:white;top:0;left:0;transform:translate(-50%,-50%);}
#cur2{width:40px;height:40px;border:1px solid rgba(255,255,255,0.3);top:0;left:0;transform:translate(-50%,-50%);transition:all 0.15s ease,width 0.2s ease,height 0.2s ease;}
body.card-hover #cur2{width:80px;height:80px;border-color:rgba(255,255,255,0.6);}

/* MESH BG */
.mesh-bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 60% at 20% 20%,rgba(120,60,255,0.12) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 80%,rgba(60,180,255,0.1) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 60% 20%,rgba(255,60,120,0.08) 0%,transparent 70%);
  animation:meshMove 12s ease-in-out infinite alternate;}
@keyframes meshMove{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(30deg)}}
.grid-lines{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:60px 60px;}

/* HEADER */
#header{position:relative;z-index:10;padding:60px 60px 0;text-align:center;}
.title-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.4em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;}
.title-main{font-family:var(--display);font-size:clamp(60px,10vw,120px);line-height:0.9;letter-spacing:0.02em;
  background:linear-gradient(135deg,#fff 0%,rgba(180,140,255,0.9) 40%,rgba(60,200,255,0.9) 80%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200% 200%;animation:gradMove 4s ease-in-out infinite alternate;}
@keyframes gradMove{from{background-position:0% 50%}to{background-position:100% 50%}}
.title-sub{font-size:14px;color:var(--text2);margin-top:16px;font-weight:300;letter-spacing:0.05em;}

/* FILTER BAR */
.filter-bar{display:flex;justify-content:center;gap:8px;margin:40px 0 0;position:relative;z-index:10;}
.filter-btn{padding:8px 20px;border-radius:100px;font-family:var(--mono);font-size:11px;letter-spacing:0.1em;cursor:pointer;transition:all 0.3s;border:1px solid var(--border);background:transparent;color:var(--text2);}
.filter-btn:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.filter-btn.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.3);color:white;}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding:48px 60px 80px;position:relative;z-index:10;max-width:1400px;margin:0 auto;}

/* THE CARD */
.holo-card{
  position:relative;border-radius:20px;overflow:hidden;
  aspect-ratio:2/3;cursor:none;
  transform-style:preserve-3d;
  transition:transform 0.1s ease,box-shadow 0.3s ease;
  will-change:transform;
}
.holo-card:hover{box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 40px rgba(120,60,255,0.2);}

/* CARD BASE */
.card-base{
  position:absolute;inset:0;
  background:var(--card-bg,linear-gradient(135deg,#1a1a2e,#16213e));
  border-radius:20px;border:1px solid rgba(255,255,255,0.12);
}

/* HOLO FOIL OVERLAY */
.holo-foil{
  position:absolute;inset:0;border-radius:20px;
  background:
    repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,0.03) 3px,rgba(255,255,255,0.03) 4px),
    repeating-linear-gradient(-45deg,transparent,transparent 3px,rgba(255,255,255,0.02) 3px,rgba(255,255,255,0.02) 4px);
  mix-blend-mode:overlay;pointer-events:none;
}
.holo-shine{
  position:absolute;inset:0;border-radius:20px;pointer-events:none;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.15) 0%,transparent 60%);
  opacity:0;transition:opacity 0.3s;mix-blend-mode:screen;
}
.holo-card:hover .holo-shine{opacity:1;}
.holo-rainbow{
  position:absolute;inset:0;border-radius:20px;pointer-events:none;
  background:conic-gradient(from var(--angle,0deg) at var(--mx,50%) var(--my,50%),
    rgba(255,0,128,0.12),rgba(255,165,0,0.12),rgba(255,255,0,0.12),
    rgba(0,255,128,0.12),rgba(0,128,255,0.12),rgba(128,0,255,0.12),rgba(255,0,128,0.12));
  opacity:0;mix-blend-mode:screen;transition:opacity 0.3s;
}
.holo-card:hover .holo-rainbow{opacity:1;}
.holo-border{
  position:absolute;inset:0;border-radius:20px;pointer-events:none;
  background:conic-gradient(from var(--angle,0deg),transparent 40%,rgba(255,255,255,0.4) 50%,transparent 60%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  padding:1px;opacity:0;transition:opacity 0.3s;
}
.holo-card:hover .holo-border{opacity:1;}

/* CARD CONTENT */
.card-content{position:absolute;inset:0;padding:24px;display:flex;flex-direction:column;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:auto;}
.card-number{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.15em;}
.card-rarity{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;padding:4px 10px;border-radius:100px;font-family:var(--mono);}
.rarity-legendary{background:rgba(255,200,50,0.2);color:#ffd700;border:1px solid rgba(255,200,50,0.3);}
.rarity-epic{background:rgba(160,50,255,0.2);color:#bf7fff;border:1px solid rgba(160,50,255,0.3);}
.rarity-rare{background:rgba(50,150,255,0.2);color:#5ab4ff;border:1px solid rgba(50,150,255,0.3);}
.rarity-common{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1);}

/* CARD VISUAL - the illustration area */
.card-art{flex:1;border-radius:12px;margin:-4px 0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}

/* CARD FOOTER */
.card-footer{margin-top:auto;padding-top:16px;}
.card-name{font-family:var(--display);font-size:28px;line-height:1;letter-spacing:0.03em;margin-bottom:4px;}
.card-type{font-size:11px;color:rgba(255,255,255,0.45);font-family:var(--mono);letter-spacing:0.1em;margin-bottom:12px;}
.card-stats{display:flex;gap:16px;}
.stat{display:flex;flex-direction:column;gap:2px;}
.stat-val{font-family:var(--mono);font-size:16px;font-weight:700;}
.stat-label{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:0.15em;text-transform:uppercase;}

/* Shimmer animation on cards */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* DETAIL MODAL */
#modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.8);backdrop-filter:blur(20px);display:none;place-items:center;}
#modal-overlay.open{display:grid;}
#modal{width:min(90vw,500px);background:#0d0d1a;border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:32px;position:relative;animation:modalIn 0.4s cubic-bezier(0.16,1,0.3,1);}
@keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:white;cursor:pointer;font-size:16px;display:grid;place-items:center;}

/* STATS BAR */
.attr-list{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.attr-row{display:flex;align-items:center;gap:10px;font-size:12px;}
.attr-name{width:80px;color:rgba(255,255,255,0.4);}
.attr-track{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden;}
.attr-fill{height:100%;border-radius:1px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
.attr-val{width:28px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.6);}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur2"></div>
<div class="mesh-bg"></div>
<div class="grid-lines"></div>

<header id="header">
  <div class="title-eyebrow">Premium Collection · 2025</div>
  <div class="title-main">HOLOGRAPHIC</div>
  <div class="title-sub">Rare digital collectibles with real-time light simulation</div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All Cards</button>
  <button class="filter-btn" data-filter="legendary">Legendary</button>
  <button class="filter-btn" data-filter="epic">Epic</button>
  <button class="filter-btn" data-filter="rare">Rare</button>
</div>

<div class="card-grid" id="card-grid"></div>

<div id="modal-overlay">
  <div id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// CURSOR
const cur=document.getElementById('cur'),cur2=document.getElementById('cur2');
let mx=0,my=0,cx2=0,cy2=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function animCur(){cur2.style.left=cx2+=(mx-cx2)*0.12+'px'||mx+'px';cur2.style.top=cy2+=(my-cy2)*0.12+'px'||my+'px';requestAnimationFrame(animCur);})();

// CARDS DATA
const CARDS=[
  {id:1,name:'NOVA',type:'Star Entity',rarity:'legendary',number:'#001',
   stats:{power:98,speed:87,energy:92},
   attrs:{STR:98,AGI:87,INT:92,DEF:74,LCK:95},
   desc:'Born from the collapse of a supergiant star. Commands stellar winds and gravitational forces.',
   bg:'linear-gradient(135deg,#1a0a2e 0%,#2d1854 50%,#0a1628 100%)',
   artColor:'#7c3aed',artColor2:'#06b6d4',artSymbol:'✦',
   statColor:'#ffd700'},
  {id:2,name:'CIPHER',type:'Data Wraith',rarity:'epic',number:'#002',
   stats:{power:82,speed:95,energy:78},
   attrs:{STR:72,AGI:95,INT:88,DEF:65,LCK:80},
   desc:'An entity of pure information, capable of rewriting reality at the binary level.',
   bg:'linear-gradient(135deg,#0a1628 0%,#162040 50%,#0a0f1e 100%)',
   artColor:'#a855f7',artColor2:'#ec4899',artSymbol:'◈',
   statColor:'#bf7fff'},
  {id:3,name:'AXIOM',type:'Logic Core',rarity:'rare',number:'#003',
   stats:{power:75,speed:68,energy:89},
   attrs:{STR:65,AGI:68,INT:95,DEF:88,LCK:72},
   desc:'A philosophical construct that transforms abstract thought into kinetic energy.',
   bg:'linear-gradient(135deg,#062818 0%,#0f3d28 50%,#041810 100%)',
   artColor:'#10b981',artColor2:'#06b6d4',artSymbol:'⬡',
   statColor:'#5ab4ff'},
  {id:4,name:'SOLSTICE',type:'Solar Mage',rarity:'legendary',number:'#004',
   stats:{power:94,speed:71,energy:99},
   attrs:{STR:88,AGI:71,INT:99,DEF:82,LCK:90},
   desc:'Channels the raw energy of twin suns, wielding light itself as a weapon.',
   bg:'linear-gradient(135deg,#1e0a00 0%,#3d1a00 50%,#1e0800 100%)',
   artColor:'#f59e0b',artColor2:'#ef4444',artSymbol:'☀',
   statColor:'#ffd700'},
  {id:5,name:'VOID',type:'Null Entity',rarity:'epic',number:'#005',
   stats:{power:88,speed:88,energy:88},
   attrs:{STR:88,AGI:88,INT:88,DEF:88,LCK:88},
   desc:'Exists in the space between dimensions. Its true form is unknowable.',
   bg:'linear-gradient(135deg,#080808 0%,#101020 50%,#060610 100%)',
   artColor:'rgba(255,255,255,0.3)',artColor2:'rgba(200,200,255,0.4)',artSymbol:'∅',
   statColor:'#bf7fff'},
  {id:6,name:'STORM',type:'Weather God',rarity:'rare',number:'#006',
   stats:{power:86,speed:93,energy:81},
   attrs:{STR:86,AGI:93,INT:75,DEF:70,LCK:85},
   desc:'Controls atmospheric phenomena across planetary scales. Fears nothing.',
   bg:'linear-gradient(135deg,#0a1428 0%,#101e3c 50%,#060e1e 100%)',
   artColor:'#38bdf8',artColor2:'#818cf8',artSymbol:'⚡',
   statColor:'#5ab4ff'},
];

function createCardArt(card) {
  // Generate SVG art based on card theme
  const s=card.artSymbol;
  return `<svg width="100%" height="100%" viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="ag${card.id}" cx="50%" cy="50%">
        <stop offset="0%" stop-color="${card.artColor}" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="${card.artColor2}" stop-opacity="0"/>
      </radialGradient>
      <filter id="glow${card.id}"><feGaussianBlur stdDeviation="3" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
    </defs>
    <!-- Background circles -->
    <circle cx="130" cy="100" r="90" fill="url(#ag${card.id})"/>
    <circle cx="130" cy="100" r="65" fill="none" stroke="${card.artColor}" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="130" cy="100" r="45" fill="none" stroke="${card.artColor}" stroke-width="0.5" stroke-opacity="0.2"/>
    <!-- Rotating lines -->
    ${Array.from({length:8},(_,i)=>`<line x1="130" y1="100" x2="${130+85*Math.cos(i*Math.PI/4)}" y2="${100+85*Math.sin(i*Math.PI/4)}" stroke="${card.artColor}" stroke-width="0.5" stroke-opacity="0.25"/>`).join('')}
    <!-- Symbol -->
    <text x="130" y="115" text-anchor="middle" font-size="50" fill="${card.artColor}" filter="url(#glow${card.id})" opacity="0.9">${s}</text>
    <!-- Corner marks -->
    <rect x="20" y="20" width="12" height="1" fill="${card.artColor}" opacity="0.4"/>
    <rect x="20" y="20" width="1" height="12" fill="${card.artColor}" opacity="0.4"/>
    <rect x="228" y="20" width="12" height="1" fill="${card.artColor}" opacity="0.4"/>
    <rect x="239" y="20" width="1" height="12" fill="${card.artColor}" opacity="0.4"/>
  </svg>`;
}

function buildCard(card) {
  const div=document.createElement('div');
  div.className='holo-card';
  div.dataset.rarity=card.rarity;
  div.innerHTML=`
    <div class="card-base" style="background:${card.bg}"></div>
    <div class="holo-foil"></div>
    <div class="holo-shine"></div>
    <div class="holo-rainbow"></div>
    <div class="holo-border"></div>
    <div class="card-content">
      <div class="card-header">
        <div class="card-number">${card.number}</div>
        <div class="card-rarity rarity-${card.rarity}">${card.rarity}</div>
      </div>
      <div class="card-art">${createCardArt(card)}</div>
      <div class="card-footer">
        <div class="card-name">${card.name}</div>
        <div class="card-type">${card.type}</div>
        <div class="card-stats">
          <div class="stat"><div class="stat-val" style="color:${card.statColor}">${card.stats.power}</div><div class="stat-label">PWR</div></div>
          <div class="stat"><div class="stat-val" style="color:${card.statColor}">${card.stats.speed}</div><div class="stat-label">SPD</div></div>
          <div class="stat"><div class="stat-val" style="color:${card.statColor}">${card.stats.energy}</div><div class="stat-label">NRG</div></div>
        </div>
      </div>
    </div>`;

  // 3D tilt effect
  div.addEventListener('mousemove',e=>{
    const rect=div.getBoundingClientRect();
    const px=(e.clientX-rect.left)/rect.width;
    const py=(e.clientY-rect.top)/rect.height;
    const rx=(py-0.5)*24;
    const ry=(px-0.5)*-24;
    div.style.transform=`perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.04,1.04,1.04)`;
    div.querySelector('.holo-shine').style.setProperty('--mx',px*100+'%');
    div.querySelector('.holo-shine').style.setProperty('--my',py*100+'%');
    div.querySelector('.holo-rainbow').style.setProperty('--mx',px*100+'%');
    div.querySelector('.holo-rainbow').style.setProperty('--my',py*100+'%');
    div.querySelector('.holo-rainbow').style.setProperty('--angle',(px*360)+'deg');
    div.querySelector('.holo-border').style.setProperty('--angle',(px*360)+'deg');
    document.body.classList.add('card-hover');
  });
  div.addEventListener('mouseleave',()=>{
    div.style.transform='perspective(800px) rotateX(0) rotateY(0) scale3d(1,1,1)';
    document.body.classList.remove('card-hover');
  });
  div.addEventListener('click',()=>openModal(card));
  return div;
}

// RENDER
const grid=document.getElementById('card-grid');
CARDS.forEach(c=>grid.appendChild(buildCard(c)));

// FILTER
document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',function(){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  this.classList.add('active');
  const f=this.dataset.filter;
  document.querySelectorAll('.holo-card').forEach(c=>{
    c.style.display=(f==='all'||c.dataset.rarity===f)?'':'none';
  });
}));

// MODAL
function openModal(card) {
  const colors={legendary:'#ffd700',epic:'#bf7fff',rare:'#5ab4ff',common:'rgba(255,255,255,0.5)'};
  const rc=colors[card.rarity];
  document.getElementById('modal-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <div style="width:56px;height:56px;border-radius:14px;background:${card.bg};border:1px solid rgba(255,255,255,0.1);display:grid;place-items:center;font-size:24px">${card.artSymbol}</div>
      <div>
        <div style="font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:0.04em">${card.name}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4);font-family:'Space Mono',monospace;margin-top:2px">${card.number} · ${card.type}</div>
      </div>
      <span style="margin-left:auto;font-size:10px;padding:4px 12px;border-radius:100px;background:${rc}22;color:${rc};border:1px solid ${rc}44;font-family:'Space Mono',monospace">${card.rarity}</span>
    </div>
    <p style="font-size:13px;color:rgba(255,255,255,0.5);line-height:1.7;margin-bottom:20px;">${card.desc}</p>
    <div style="font-size:10px;letter-spacing:0.2em;color:rgba(255,255,255,0.25);margin-bottom:10px;">ATTRIBUTES</div>
    <div class="attr-list" id="attrs"></div>
  `;
  const attrs=document.getElementById('attrs');
  Object.entries(card.attrs).forEach(([k,v])=>{
    attrs.innerHTML+=`<div class="attr-row"><div class="attr-name" style="font-family:'Space Mono',monospace">${k}</div><div class="attr-track"><div class="attr-fill" data-w="${v}" style="width:0%;background:${card.statColor}"></div></div><div class="attr-val">${v}</div></div>`;
  });
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>{
    document.querySelectorAll('.attr-fill').forEach(f=>{f.style.width=f.dataset.w+'%';});
  },100);
}
document.getElementById('modal-close').onclick=()=>document.getElementById('modal-overlay').classList.remove('open');
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal-overlay').classList.remove('open');});
</script>
</body>
</html>
