<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HOLO — Card Gallery</title>
 <link rel="stylesheet" href="styles.css"/> 
</head>
<body>
<div id="cur"></div>
<div id="cur2"></div>
<div class="mesh-bg"></div>
<div class="grid-lines"></div>

<header id="header">
  <div class="title-eyebrow">Premium Collection · 2025</div>
  <div class="title-main">HOLOGRAPHIC</div>
  <div class="title-sub">Rare digital collectibles with real-time light simulation</div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All Cards</button>
  <button class="filter-btn" data-filter="legendary">Legendary</button>
  <button class="filter-btn" data-filter="epic">Epic</button>
  <button class="filter-btn" data-filter="rare">Rare</button>
</div>

<div class="card-grid" id="card-grid"></div>

<div id="modal-overlay">
  <div id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="script.js"></script> 
</body>
</html>
